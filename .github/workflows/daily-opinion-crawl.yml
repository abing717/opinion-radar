name: Daily Opinion Radar Crawl and Deploy

on:
  push:
    branches:
      - main
  schedule:
    # 08:30 Asia/Taipei every day.
    - cron: "30 0 * * *"
    # 15:30 Asia/Taipei every day.
    - cron: "30 7 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Crawl public news feeds
        run: node scripts/daily-opinion-crawler.mjs

      - name: Prepare Pages artifact
        run: |
          rm -rf .pages
          mkdir -p .pages
          cp index.html README.md .nojekyll .pages/
          cp -R data .pages/data

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
